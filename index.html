<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Emocional Escolar</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3498db">
    <link rel="icon" type="image/png" href="icono.png">
    <link rel="apple-touch-icon" href="icono.png">

    <style>
       /* FONDO PRINCIPAL CON EMOJIS FLOTANTES Y COLOR RELAJANTE */
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    
    /* ЁЯОи NUEVO COLOR: Degradado suave y relajante "Brisa Marina" */
    background: linear-gradient(135deg, #e3f2fd 0%, #e0f2f1 100%);
    background-attachment: fixed; /* Mantiene el fondo quieto al hacer scroll */

    display: flex; 
    justify-content: center; 
    align-items: center; /* Centrar verticalmente */
    min-height: 100vh; /* Ocupar toda la altura */
    padding: 20px; 
    overflow: hidden; /* Evitar barras de desplazamiento por los emojis */
    position: relative; /* Necesario para los emojis absolutos */
}

/* ESTILO PARA LOS EMOJIS FLOTANTES */
.emoji-flotante {
    position: absolute;
    user-select: none;
    pointer-events: none;
    z-index: 1; 
    opacity: 0;
    animation: flotar linear infinite;
}

@keyframes flotar {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}
    </style>
</head>
<body>

    <div id="fondoEmojis"></div>

    <div class="card" id="mainCard">
        <h2>ЁЯПл ┬бHola!</h2>
        <p class="subtitle">Registra tu asistencia y emociones de hoy</p>
        
        <label>Nombre Completo:</label>
        <input type="text" id="nombre" placeholder="Escribre tu nombre...">

       
        <label>┬┐C├│mo te sientes hoy?</label>
        <select id="emocion" onchange="actualizarFrase()">
            <option value="">-- Selecciona una emoci├│n --</option>
            <option value="Alegre">Alegre ЁЯШГ</option>
            <option value="Triste">Triste ЁЯШФ</option>
            <option value="Cansado">Cansado ЁЯе▒</option>
            <option value="Molesto">Molesto ЁЯШа</option>
            <option value="Ansioso">Ansioso ЁЯШ░</option>
            <option value="Motivado">Motivado ЁЯЪА</option>
            <option value="Aburrido">Aburrido ЁЯШС</option>
            <option value="Agradecido">Agradecido ЁЯЩП</option>
            <option value="Preocupado">Preocupado ЁЯШЯ</option>
            <option value="Orgulloso">Orgulloso тнР</option>
        </select>

        <div id="cajaFrase" class="frase-caja"></div>

        <label>Mis 3 prop├│sitos para hoy:</label>
        <input type="text" id="a1" placeholder="1. Prop├│sito escolar o emocional">
        <input type="text" id="a2" placeholder="2. Prop├│sito escolar o emocional">
        <input type="text" id="a3" placeholder="3. Prop├│sito escolar o emocional">

        <button onclick="enviarDatos()">тЬЕ Registrar Asistencia</button>
       <button onclick="crearRecordatorio()" style="background: #e67e22; margin-top: 10px;">тП░ Recordatorio de Lunes a Viernes</button>
 <p id="mensajeExito" class="success-msg">┬бAsistencia enviada! Que tengas un gran d├нa. тЬи</p>
    </div>

    <script>
        const frases = {
            "Alegre": "┬бTu energ├нa es contagiosa! Aprovecha este impulso para brillar.",
            "Triste": "Se vale no estar bien. Ma├▒ana ser├б una nueva oportunidad.",
            "Cansado": "Escucha a tu cuerpo. Un paso a la vez tambi├йn te lleva a la meta.",
            "Molesto": "Respira profundo. No dejes que un momento amargo defina tu d├нa.",
            "Ansioso": "Conc├йntrate en el aqu├н y el ahora. Todo estar├б bien.",
            "Motivado": "┬бEsa es la actitud! Aprovecha este enfoque para conquistar tus metas.",
            "Aburrido": "A veces la calma es una oportunidad para ser creativo.",
            "Agradecido": "La gratitud transforma lo que tenemos en suficiente.",
            "Preocupado": "No cargues con todo solo. Conf├нa en tus capacidades.",
            "Orgulloso": "┬бFelicidades! Reconocer tus logros te hace m├бs grande."
        };

        function actualizarFrase() {
            const sel = document.getElementById('emocion').value;
            const caja = document.getElementById('cajaFrase');
            if(sel) {
                caja.innerText = frases[sel];
                caja.style.display = 'block';
            } else {
                caja.style.display = 'none';
            }
        }

        function enviarDatos() {
            const nombre = document.getElementById('nombre').value;
            const emocion = document.getElementById('emocion').value;
            const a1 = document.getElementById('a1').value;
            const a2 = document.getElementById('a2').value;
            const a3 = document.getElementById('a3').value;

            if(!nombre || !emocion) {
                alert("Por favor escribe tu nombre y elige una emoci├│n.");
                return;
            }

            // URL base del formulario (sin el /viewform)
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLScyL7EwlWvuipdpNdCuscFAl-35k61oRErvc7gpKOdw60kuww/formResponse";
            
            // Creamos un formulario oculto para enviar los datos
            const formData = new FormData();
            formData.append("entry.676686131", nombre);
            formData.append("entry.375224898", emocion);
            formData.append("entry.729924200", a1);
            formData.append("entry.1764392682", a2);
            formData.append("entry.1393453133", a3);

            // Env├нo silencioso
            fetch(formURL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                document.getElementById('mensajeExito').style.display = 'block';
                document.querySelector('button').disabled = true;
                setTimeout(() => { location.reload(); }, 3000); // Recarga para el siguiente uso
            }).catch(err => alert("Error al enviar. Int├йntalo de nuevo."));
        }
    </script>


        <script>
    const emojisArr = ['ЁЯШГ', 'ЁЯШФ', 'ЁЯе▒', 'ЁЯШа', 'ЁЯШ░', 'ЁЯЪА', 'ЁЯШС', 'ЁЯЩП', 'ЁЯШЯ', 'тнР', 'тЭдя╕П', 'ЁЯФе', 'ЁЯза', 'тЬи', 'тЪб'];
    const fondo = document.getElementById('fondoEmojis');

    function crearEmoji() {
        const span = document.createElement('span');
        span.classList.add('emoji-flotante');
        span.innerText = emojisArr[Math.floor(Math.random() * emojisArr.length)];
        
        // Distribuci├│n en todo el ancho
        span.style.left = Math.random() * 100 + 'vw';
        
        // Tama├▒os y velocidades variadas
        const size = Math.random() * 2 + 1.5; 
        span.style.fontSize = size + 'rem';
        const duracion = Math.random() * 8 + 7; 
        span.style.animationDuration = duracion + 's';

        fondo.appendChild(span);
        setTimeout(() => { span.remove(); }, 15000);
    }

    // Generar emojis constantemente
    setInterval(crearEmoji, 500); // Uno cada medio segundo para llenar la pantalla
   function crearRecordatorio() {
    const titulo = "Registrar Asistencia Emocional ЁЯПл";
    const detalles = "Toca aqu├н para registrarte: https://monicaandrade-bot.github.io/asistencia-/";
    
    // Este enlace abre Google Calendar con todo ya escrito
    const url = "https://www.google.com/calendar/render?action=TEMPLATE" +
                "&text=" + encodeURIComponent(titulo) +
                "&details=" + encodeURIComponent(detalles) +
                "&recur=RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR" + 
                "&dates=20260413T080000/20260413T081500"; // Configurado para las 8:00 AM

    window.open(url, '_blank');
}
 </script>

</body>
</html>
